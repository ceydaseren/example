<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline Jumpers — Content Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a1f;--mid:#15122e;--card:rgba(30,26,62,0.6);--border:rgba(255,255,255,0.08);
--glow:rgba(28,214,231,0.35);--text:#f8f5ff;--text-sec:rgba(248,245,255,0.72);--text-muted:rgba(248,245,255,0.35);
--cyan:#1cd6e7;--magenta:#f62bd1;--purple:#8051c8;--amber:#f4a749;
--grad:linear-gradient(135deg,#1cd6e7,#8051c8,#f62bd1);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

/* Stars */
#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
.glow-1{position:fixed;top:-200px;left:-200px;width:700px;height:700px;background:var(--cyan);filter:blur(130px);opacity:0.22;border-radius:50%;z-index:0;pointer-events:none}
.glow-2{position:fixed;bottom:-150px;right:-150px;width:500px;height:500px;background:var(--magenta);filter:blur(130px);opacity:0.18;border-radius:50%;z-index:0;pointer-events:none}
.glow-3{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:450px;height:450px;background:var(--purple);filter:blur(130px);opacity:0.18;border-radius:50%;z-index:0;pointer-events:none}

/* Layout */
#app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 24px 80px}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;flex-wrap:wrap;gap:16px}
.logo{display:flex;flex-direction:column}
.logo-eye{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.15em;color:var(--cyan);text-shadow:0 0 12px rgba(28,214,231,0.5);margin-bottom:4px}
.logo-title{font-family:'Fraunces',serif;font-size:28px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.add-btn{padding:10px 22px;background:var(--grad);border:none;border-radius:30px;color:#fff;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;letter-spacing:0.05em;transition:opacity 0.2s}
.add-btn:hover{opacity:0.85}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:32px}
.stat-card{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:12px;padding:16px 20px}
.stat-label{font-size:10px;font-weight:600;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px}
.stat-value{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--text)}
.stat-value.cyan{color:var(--cyan)}
.stat-value.magenta{color:var(--magenta)}
.stat-value.purple{color:var(--purple)}

/* Controls */
.controls{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.week-nav{display:flex;align-items:center;gap:8px}
.nav-btn{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:border-color 0.2s}
.nav-btn:hover{border-color:var(--cyan)}
.week-label{font-size:13px;font-weight:600;color:var(--text-sec);min-width:160px;text-align:center}
.filter-group{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.filter-btn{padding:6px 14px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;letter-spacing:0.08em;transition:all 0.2s}
.filter-btn.active{border-color:var(--cyan);color:var(--cyan)}

/* Calendar Grid */
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:32px}
.day-col{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:12px;min-height:160px;padding:12px 10px}
.day-header{font-size:10px;font-weight:600;letter-spacing:0.1em;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px}
.day-date{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:10px}
.day-col.today{border-color:rgba(28,214,231,0.4);box-shadow:0 0 0 1px rgba(28,214,231,0.15)}
.day-col.today .day-date{color:var(--cyan)}
.post-pill{border-radius:8px;padding:6px 8px;margin-bottom:6px;cursor:pointer;transition:opacity 0.15s;position:relative}
.post-pill:hover{opacity:0.8}
.post-platform{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2px}
.post-hook{font-size:10px;font-weight:400;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.post-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:8px;font-weight:600;padding:1px 5px;border-radius:4px;letter-spacing:0.05em}
.add-day-btn{width:100%;padding:6px;background:transparent;border:1px dashed var(--border);border-radius:8px;color:var(--text-muted);font-size:11px;cursor:pointer;transition:all 0.2s;margin-top:4px}
.add-day-btn:hover{border-color:var(--cyan);color:var(--cyan)}

/* Platform colors */
.plt-tiktok{background:rgba(18,212,231,0.12);border-left:3px solid #1cd6e7}
.plt-tiktok .post-platform{color:#1cd6e7}
.plt-instagram{background:rgba(246,43,209,0.12);border-left:3px solid #f62bd1}
.plt-instagram .post-platform{color:#f62bd1}
.plt-youtube{background:rgba(255,80,80,0.12);border-left:3px solid #ff5050}
.plt-youtube .post-platform{color:#ff5050}
.plt-substack{background:rgba(255,165,50,0.12);border-left:3px solid #f4a749}
.plt-substack .post-platform{color:#f4a749}
.plt-pinterest{background:rgba(189,8,28,0.15);border-left:3px solid #e60023}
.plt-pinterest .post-platform{color:#e88}
.plt-linkedin{background:rgba(0,119,181,0.15);border-left:3px solid #0077b5}
.plt-linkedin .post-platform{color:#6bbde0}

/* SAS tags */
.tag-selection{background:rgba(28,214,231,0.15);color:var(--cyan)}
.tag-activation{background:rgba(246,43,209,0.15);color:var(--magenta)}
.tag-stabilization{background:rgba(128,81,200,0.15);color:var(--purple)}
.status-draft{background:rgba(248,245,255,0.08);color:var(--text-muted)}
.status-scheduled{background:rgba(244,167,73,0.15);color:var(--amber)}
.status-published{background:rgba(40,200,100,0.15);color:#4ded90}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:#15122e;border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Fraunces',serif;font-size:22px;font-weight:700;margin-bottom:24px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.field{margin-bottom:18px}
.field label{display:block;font-size:10px;font-weight:600;letter-spacing:0.12em;color:var(--cyan);text-transform:uppercase;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:rgba(10,10,31,0.6);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.field input:focus,.field select,.field textarea:focus{border-color:var(--cyan)}
.field select{cursor:pointer}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.field select option{background:#15122e}
.modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px}
.btn-cancel{padding:10px 20px;background:transparent;border:1px solid var(--border);border-radius:30px;color:var(--text-muted);font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer}
.btn-cancel:hover{border-color:var(--text-muted)}
.btn-save{padding:10px 24px;background:var(--grad);border:none;border-radius:30px;color:#fff;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer}
.btn-save:hover{opacity:0.88}
.btn-delete{padding:10px 16px;background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);border-radius:30px;color:#ff8080;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;margin-right:auto}
.btn-delete:hover{background:rgba(255,80,80,0.2)}

/* List view */
.list-view{display:none}
.list-view.active{display:block}
.list-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color 0.2s}
.list-item:hover{border-color:rgba(28,214,231,0.3)}
.list-date-col{font-size:12px;color:var(--text-muted);min-width:60px}
.list-content{flex:1}
.list-platform{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2px}
.list-hook{font-size:13px;color:var(--text-sec)}
.list-tags{display:flex;gap:6px;margin-top:6px}
.view-toggle{display:flex;gap:6px;margin-left:8px}
.view-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer}
.view-btn.active{border-color:var(--cyan);color:var(--cyan)}

/* Footer */
footer{text-align:center;font-size:11px;font-weight:300;color:var(--text-muted);border-top:1px solid var(--border);padding:32px 0 0;margin-top:48px}

@media(max-width:700px){
.calendar{grid-template-columns:1fr}
.modal{padding:24px}
}
</style>
</head>
<body>
<div id="stars"></div>
<div class="glow-1"></div><div class="glow-2"></div><div class="glow-3"></div>

<div id="app">
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Timeline Jumpers Content Planner — schedule and track social media posts across platforms</h2>

<header>
  <div class="logo">
    <span class="logo-eye">CONTENT PLANNER</span>
    <span class="logo-title">Timeline Jumpers</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="view-toggle">
      <button class="view-btn active" id="calViewBtn" onclick="setView('calendar')">Calendar</button>
      <button class="view-btn" id="listViewBtn" onclick="setView('list')">List</button>
    </div>
    <button class="add-btn" onclick="openModal()">+ Add Post</button>
  </div>
</header>

<div class="stats-row" id="statsRow"></div>

<div class="controls">
  <div class="week-nav">
    <button class="nav-btn" onclick="shiftWeek(-1)">&#8592;</button>
    <span class="week-label" id="weekLabel"></span>
    <button class="nav-btn" onclick="shiftWeek(1)">&#8594;</button>
  </div>
  <div class="filter-group" id="filterGroup">
    <button class="filter-btn active" data-plat="All" onclick="setFilter('All')">All</button>
    <button class="filter-btn" data-plat="TikTok" onclick="setFilter('TikTok')">TikTok</button>
    <button class="filter-btn" data-plat="Instagram" onclick="setFilter('Instagram')">Instagram</button>
    <button class="filter-btn" data-plat="YouTube" onclick="setFilter('YouTube')">YouTube</button>
    <button class="filter-btn" data-plat="Substack" onclick="setFilter('Substack')">Substack</button>
    <button class="filter-btn" data-plat="Pinterest" onclick="setFilter('Pinterest')">Pinterest</button>
    <button class="filter-btn" data-plat="LinkedIn" onclick="setFilter('LinkedIn')">LinkedIn</button>
  </div>
</div>

<div class="calendar" id="calendarGrid"></div>
<div class="list-view" id="listContainer"></div>

<footer>© 2026 Ceyda Seren. All rights reserved.</footer>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeOnOverlay(event)">
<div class="modal" id="modalBox">
  <h2 id="modalTitle">New Post</h2>
  <div class="field">
    <label>Date</label>
    <input type="date" id="f-date">
  </div>
  <div class="field">
    <label>Platform</label>
    <select id="f-platform">
      <option value="TikTok">TikTok</option>
      <option value="Instagram">Instagram</option>
      <option value="YouTube">YouTube</option>
      <option value="Substack">Substack</option>
      <option value="Pinterest">Pinterest</option>
      <option value="LinkedIn">LinkedIn</option>
    </select>
  </div>
  <div class="field">
    <label>Content Series (optional)</label>
    <input type="text" id="f-series" placeholder="e.g. Timeline Ink, Cosmic Bowl...">
  </div>
  <div class="field">
    <label>Hook / Caption</label>
    <textarea id="f-hook" placeholder="What does this post say or do?"></textarea>
  </div>
  <div class="field">
    <label>SAS Phase</label>
    <select id="f-sas">
      <option value="Selection">Selection</option>
      <option value="Activation">Activation</option>
      <option value="Stabilization">Stabilization</option>
      <option value="General">General</option>
    </select>
  </div>
  <div class="field">
    <label>Status</label>
    <select id="f-status">
      <option value="Draft">Draft</option>
      <option value="Scheduled">Scheduled</option>
      <option value="Published">Published</option>
    </select>
  </div>
  <div class="modal-actions" id="modalActions">
    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    <button class="btn-save" onclick="savePost()">Save Post</button>
  </div>
</div>
</div>

<script>
// Stars
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s`;
    c.appendChild(s);
  }
})();

// State
let posts=[];
let currentWeekStart=getMonday(new Date());
let activeFilter='All';
let editingId=null;
let currentView='calendar';

// Storage key
const SK='tj_planner_posts_v1';

async function loadPosts(){
  try{
    const r=await window.storage.get(SK);
    if(r&&r.value) posts=JSON.parse(r.value);
  }catch(e){posts=[];}
  render();
}

async function savePosts(){
  try{await window.storage.set(SK,JSON.stringify(posts));}catch(e){}
}

// Helpers
function getMonday(d){
  const dt=new Date(d);
  const day=dt.getDay();
  const diff=day===0?-6:1-day;
  dt.setDate(dt.getDate()+diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function dateStr(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const dy=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dy}`;
}

function platClass(p){return 'plt-'+p.toLowerCase();}

function sasClass(s){
  const m={Selection:'tag-selection',Activation:'tag-activation',Stabilization:'tag-stabilization',General:'status-draft'};
  return m[s]||'status-draft';
}

function statusClass(s){
  const m={Draft:'status-draft',Scheduled:'status-scheduled',Published:'status-published'};
  return m[s]||'status-draft';
}

function uid(){return Date.now()+'-'+Math.random().toString(36).slice(2);}

// Week label
function updateWeekLabel(){
  const end=new Date(currentWeekStart);end.setDate(end.getDate()+6);
  const fmt=d=>d.toLocaleDateString('en-CA',{month:'short',day:'numeric'});
  document.getElementById('weekLabel').textContent=`${fmt(currentWeekStart)} – ${fmt(end)}`;
}

function shiftWeek(dir){currentWeekStart.setDate(currentWeekStart.getDate()+dir*7);render();}

// Filter
function setFilter(p){
  activeFilter=p;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.plat===p));
  render();
}

// View
function setView(v){
  currentView=v;
  document.getElementById('calViewBtn').classList.toggle('active',v==='calendar');
  document.getElementById('listViewBtn').classList.toggle('active',v==='list');
  document.getElementById('calendarGrid').style.display=v==='calendar'?'grid':'none';
  document.getElementById('listContainer').classList.toggle('active',v==='list');
}

// Stats
function renderStats(){
  const total=posts.length;
  const published=posts.filter(p=>p.status==='Published').length;
  const sel=posts.filter(p=>p.sas==='Selection').length;
  const act=posts.filter(p=>p.sas==='Activation').length;
  const stab=posts.filter(p=>p.sas==='Stabilization').length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total Posts</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Published</div><div class="stat-value" style="color:#4ded90">${published}</div></div>
    <div class="stat-card"><div class="stat-label">Selection</div><div class="stat-value cyan">${sel}</div></div>
    <div class="stat-card"><div class="stat-label">Activation</div><div class="stat-value magenta">${act}</div></div>
    <div class="stat-card"><div class="stat-label">Stabilization</div><div class="stat-value purple">${stab}</div></div>
  `;
}

// Calendar
function renderCalendar(){
  const grid=document.getElementById('calendarGrid');
  grid.innerHTML='';
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const todayStr=dateStr(new Date());
  for(let i=0;i<7;i++){
    const d=new Date(currentWeekStart);d.setDate(d.getDate()+i);
    const ds=dateStr(d);
    const dayPosts=posts.filter(p=>p.date===ds&&(activeFilter==='All'||p.platform===activeFilter));
    const col=document.createElement('div');
    col.className='day-col'+(ds===todayStr?' today':'');
    col.innerHTML=`<div class="day-header">${days[i]}</div><div class="day-date">${d.getDate()}</div>`;
    dayPosts.forEach(p=>{
      const pill=document.createElement('div');
      pill.className=`post-pill ${platClass(p.platform)}`;
      pill.innerHTML=`
        <div class="post-platform">${p.platform}${p.series?' · '+p.series:''}</div>
        <div class="post-hook">${p.hook||'(no caption)'}</div>
        <div class="post-tags">
          <span class="tag ${sasClass(p.sas)}">${p.sas}</span>
          <span class="tag ${statusClass(p.status)}">${p.status}</span>
        </div>`;
      pill.onclick=()=>openModal(p.id);
      col.appendChild(pill);
    });
    const addBtn=document.createElement('button');
    addBtn.className='add-day-btn';addBtn.textContent='+ Add';
    addBtn.onclick=()=>openModal(null,ds);
    col.appendChild(addBtn);
    grid.appendChild(col);
  }
}

// List
function renderList(){
  const lc=document.getElementById('listContainer');
  const filtered=posts.filter(p=>activeFilter==='All'||p.platform===activeFilter)
    .sort((a,b)=>a.date.localeCompare(b.date));
  if(!filtered.length){lc.innerHTML='<p style="color:var(--text-muted);font-size:13px;padding:24px 0">No posts yet. Click + Add Post to get started.</p>';return;}
  lc.innerHTML=filtered.map(p=>`
    <div class="list-item" onclick="openModal('${p.id}')">
      <div class="list-date-col">${p.date.slice(5).replace('-','/')}</div>
      <div class="list-content">
        <div class="list-platform ${platClass(p.platform)}" style="padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:4px">${p.platform}${p.series?' · '+p.series:''}</div>
        <div class="list-hook">${p.hook||'(no caption)'}</div>
        <div class="list-tags">
          <span class="tag ${sasClass(p.sas)}">${p.sas}</span>
          <span class="tag ${statusClass(p.status)}">${p.status}</span>
        </div>
      </div>
    </div>`).join('');
}

function render(){
  updateWeekLabel();
  renderStats();
  renderCalendar();
  renderList();
}

// Modal
function openModal(id=null,prefillDate=null){
  editingId=id;
  const overlay=document.getElementById('modalOverlay');
  const actions=document.getElementById('modalActions');
  if(id){
    const p=posts.find(x=>x.id===id);
    if(!p)return;
    document.getElementById('modalTitle').textContent='Edit Post';
    document.getElementById('f-date').value=p.date;
    document.getElementById('f-platform').value=p.platform;
    document.getElementById('f-series').value=p.series||'';
    document.getElementById('f-hook').value=p.hook||'';
    document.getElementById('f-sas').value=p.sas;
    document.getElementById('f-status').value=p.status;
    actions.innerHTML=`
      <button class="btn-delete" onclick="deletePost()">Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="savePost()">Save Changes</button>`;
  } else {
    document.getElementById('modalTitle').textContent='New Post';
    document.getElementById('f-date').value=prefillDate||dateStr(new Date());
    document.getElementById('f-platform').value='Instagram';
    document.getElementById('f-series').value='';
    document.getElementById('f-hook').value='';
    document.getElementById('f-sas').value='Selection';
    document.getElementById('f-status').value='Draft';
    actions.innerHTML=`
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="savePost()">Save Post</button>`;
  }
  overlay.style.display='flex';
}

function closeModal(){document.getElementById('modalOverlay').style.display='none';editingId=null;}
function closeOnOverlay(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

function savePost(){
  const d={
    id:editingId||uid(),
    date:document.getElementById('f-date').value,
    platform:document.getElementById('f-platform').value,
    series:document.getElementById('f-series').value.trim(),
    hook:document.getElementById('f-hook').value.trim(),
    sas:document.getElementById('f-sas').value,
    status:document.getElementById('f-status').value
  };
  if(!d.date){alert('Please pick a date.');return;}
  if(editingId){
    const idx=posts.findIndex(p=>p.id===editingId);
    if(idx>-1)posts[idx]=d;
  } else {
    posts.push(d);
  }
  savePosts();
  closeModal();
  // Jump to the week containing the saved post
  currentWeekStart=getMonday(new Date(d.date+'T12:00:00'));
  render();
}

function deletePost(){
  if(!editingId)return;
  posts=posts.filter(p=>p.id!==editingId);
  savePosts();
  closeModal();
  render();
}

// Init
loadPosts();
updateWeekLabel();
</script>
</body>
</html>
